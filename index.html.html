<style>
/* ══════════════ THEME ══════════════ */
[data-theme="dark"] {
  --bg:#0d0d0f; --surface:#16161a; --surface2:#1e1e24; --surface3:#252530;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.15);
  --gold:#c9a84c; --gold2:#e8c97a; --text:#f0ede8; --text2:#a09a90; --text3:#5c5750;
  --red:#e05a5a; --green:#4caf7d; --blue:#5a9de0;
  --header-bg:rgba(13,13,15,0.93); --modal-bg-color:rgba(0,0,0,0.78);
  --shadow:0 4px 24px rgba(0,0,0,0.5); --radius:12px; --radius-sm:8px;
}
[data-theme="light"] {
  --bg:#f5f2ec; --surface:#ffffff; --surface2:#f0ece3; --surface3:#e8e3d8;
  --border:rgba(0,0,0,0.09); --border2:rgba(0,0,0,0.18);
  --gold:#8a6820; --gold2:#b58930; --text:#1a1710; --text2:#6b6350; --text3:#b0a898;
  --red:#c0392b; --green:#1e7a4a; --blue:#1a5fa0;
  --header-bg:rgba(245,242,236,0.95); --modal-bg-color:rgba(0,0,0,0.45);
  --shadow:0 4px 24px rgba(0,0,0,0.12); --radius:12px; --radius-sm:8px;
}

/* ══════════════ SPLASH SCREEN ══════════════ */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: #0d0d0f;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  transition: opacity 0.8s ease;
}
#splash.fade-out { opacity: 0; pointer-events: none; }

.splash-film-strip {
  position: absolute; top: 0; left: 0; right: 0; height: 60px;
  display: flex;
  overflow: hidden;
  opacity: 0;
  animation: filmReveal 0.6s ease 0.2s forwards;
}
.splash-film-strip.bottom {
  top: auto; bottom: 0;
  animation-delay: 0.3s;
}
.film-hole {
  width: 36px; height: 60px; flex-shrink: 0;
  background: #111115;
  border-right: 1px solid #1a1a22;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-evenly;
  padding: 8px 0;
}
.film-hole::before, .film-hole::after {
  content: '';
  width: 16px; height: 12px;
  border-radius: 3px;
  background: #0d0d0f;
  border: 1px solid #2a2a35;
}

.splash-logo-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  opacity: 0;
  animation: logoReveal 0.9s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
}

.splash-lens {
  position: relative; width: 110px; height: 110px;
}
.splash-lens svg {
  width: 110px; height: 110px;
  animation: lensRotate 8s linear infinite;
  filter: drop-shadow(0 0 18px rgba(201,168,76,0.35));
}
.splash-lens-center {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 28px; height: 28px; border-radius: 50%;
  background: radial-gradient(circle, #e8c97a 0%, #c9a84c 60%, #8a6820 100%);
  box-shadow: 0 0 14px rgba(232,201,122,0.5);
  animation: lensGlow 2s ease-in-out infinite alternate;
}

.splash-title {
  text-align: center;
}
.splash-title .cine-word {
  display: block;
  font-family: 'Playfair Display', serif;
  font-size: 14px; letter-spacing: 0.4em;
  color: rgba(201,168,76,0.6);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.splash-title .diary-word {
  display: block;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 46px;
  color: #c9a84c;
  letter-spacing: 0.06em;
  line-height: 1;
  text-shadow: 0 0 30px rgba(201,168,76,0.3);
}

.splash-tagline {
  font-family: 'Noto Serif KR', serif;
  font-size: 12px;
  color: rgba(160,154,144,0.6);
  letter-spacing: 0.15em;
  animation: taglineFade 1s ease 1.6s forwards;
  opacity: 0;
}

.splash-bar {
  position: absolute; bottom: 80px;
  width: 120px; height: 2px;
  background: var(--surface3, #252530);
  border-radius: 2px;
  overflow: hidden;
  opacity: 0;
  animation: barAppear 0.4s ease 1.4s forwards;
}
.splash-bar-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #c9a84c, #e8c97a);
  border-radius: 2px;
  animation: barFill 1.2s ease 1.5s forwards;
}

@keyframes filmReveal { to { opacity: 1; } }
@keyframes logoReveal { to { opacity: 1; transform: translateY(0); } }
@keyframes lensRotate { to { transform: rotate(360deg); } }
@keyframes lensGlow {
  from { box-shadow: 0 0 10px rgba(232,201,122,0.4); }
  to   { box-shadow: 0 0 22px rgba(232,201,122,0.8); }
}
@keyframes taglineFade { to { opacity: 1; } }
@keyframes barAppear { to { opacity: 1; } }
@keyframes barFill { to { width: 100%; } }

/* ══════════════ RESET & BASE ══════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Noto Serif KR', serif; font-weight: 300;
  min-height: 100vh; line-height: 1.6;
  transition: background 0.35s, color 0.35s;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}
#app { opacity: 0; transition: opacity 0.5s ease; }
#app.visible { opacity: 1; }

/* ══════════════ HEADER ══════════════ */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  background: var(--header-bg); backdrop-filter: blur(14px);
  transition: background 0.35s, border-color 0.35s;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon svg { width: 34px; height: 34px; filter: drop-shadow(0 0 5px rgba(201,168,76,0.3)); }
.logo-text { display: flex; flex-direction: column; line-height: 1.1; }
.logo-text .cine { font-family:'Playfair Display',serif; font-size:10px; letter-spacing:0.25em; color:var(--text2); text-transform:uppercase; }
.logo-text .diary { font-family:'Playfair Display',serif; font-size:18px; font-style:italic; color:var(--gold); letter-spacing:0.04em; }
.header-right { display: flex; align-items: center; gap: 18px; }
.header-stats { display: flex; gap: 14px; font-size: 12px; color: var(--text2); }
.header-stats strong { color: var(--text); font-weight: 500; }
.sync-status { font-size: 11px; color: var(--text3); display:flex; align-items:center; gap:4px; }
.sync-dot { width:6px; height:6px; border-radius:50%; background:var(--green); }
.sync-dot.syncing { background:var(--gold); animation: syncPulse 1s ease infinite; }
.sync-dot.error { background:var(--red); }
@keyframes syncPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* THEME TOGGLE */
.theme-toggle { width:52px;height:28px;border-radius:14px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;position:relative;transition:background 0.3s;flex-shrink:0; }
.theme-toggle-knob { position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--gold);transition:transform 0.3s;display:flex;align-items:center;justify-content:center;font-size:11px; }
[data-theme="light"] .theme-toggle-knob { transform:translateX(24px); }
.theme-label { font-size:11px; color:var(--text3); white-space:nowrap; }

/* ══════════════ TABS ══════════════ */
.tabs { display:flex;gap:4px;padding:12px 28px 0;border-bottom:1px solid var(--border);background:var(--header-bg);backdrop-filter:blur(14px);transition:background 0.35s;position:sticky;top:65px;z-index:99; }
.tab { padding:9px 20px;font-size:13px;font-family:'Noto Serif KR',serif;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;border-top:none;border-left:none;border-right:none;background:none;transition:all 0.2s;letter-spacing:0.01em; }
.tab.active { color:var(--gold);border-bottom-color:var(--gold); }
.tab:hover:not(.active) { color:var(--text); }

/* ══════════════ MAIN ══════════════ */
main { padding:28px; max-width:1100px; margin:0 auto; }
.section { display:none; }
.section.active { display:block; }

/* ══════════════ TYPOGRAPHY ══════════════ */
.page-title { font-family:'Playfair Display',serif;font-size:26px;color:var(--gold);margin-bottom:6px;letter-spacing:0.02em; }
.page-title em { font-style:italic;color:var(--gold2); }
.page-sub { font-size:13px;color:var(--text2);margin-bottom:20px; }

/* ══════════════ SEARCH ══════════════ */
.search-area { margin-bottom:24px; }
.search-box { display:flex;gap:10px; }
.search-box input { flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 16px;color:var(--text);font-size:14px;font-family:'Noto Serif KR',serif;outline:none;transition:border-color 0.2s; }
.search-box input:focus { border-color:var(--gold); }
.search-box input::placeholder { color:var(--text3); }

/* ══════════════ BUTTONS ══════════════ */
.btn { padding:12px 22px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:13px;font-family:'Noto Serif KR',serif;font-weight:400;transition:all 0.2s;letter-spacing:0.01em; }
.btn-gold { background:var(--gold);color:var(--bg); }
.btn-gold:hover { background:var(--gold2); }
.btn-ghost { background:transparent;border:1px solid var(--border2);color:var(--text2); }
.btn-ghost:hover { border-color:var(--gold);color:var(--gold); }
.btn-sm { padding:7px 14px;font-size:12px; }
.btn-blue { background:transparent;border:1px solid rgba(90,157,224,0.4);color:var(--blue); }
.btn-blue:hover { background:rgba(90,157,224,0.1); }
.btn-danger { background:transparent;border:1px solid var(--border);color:var(--red); }
.btn-danger:hover { border-color:var(--red);background:rgba(224,90,90,0.08); }

/* ══════════════ RESULT CARD ══════════════ */
.result-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;display:flex;gap:20px;margin-bottom:20px;animation:fadeIn 0.3s ease;box-shadow:var(--shadow); }
.poster-placeholder { width:90px;height:130px;background:var(--surface2);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;border:1px solid var(--border); }
.movie-info h3 { font-family:'Playfair Display',serif;font-size:20px;color:var(--text);margin-bottom:4px; }
.movie-info .meta { display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text2);margin-bottom:12px; }
.movie-info .synopsis { font-size:13px;color:var(--text2);line-height:1.7;max-height:60px;overflow:hidden;margin-bottom:14px; }

/* ══════════════ BADGES ══════════════ */
.badge { display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500;font-family:'Noto Serif KR',serif; }
.badge-genre { background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid rgba(201,168,76,0.3); }
.badge-watch { background:rgba(76,175,125,0.15);color:var(--green);border:1px solid rgba(76,175,125,0.3); }
.badge-wish  { background:rgba(90,157,224,0.15);color:var(--blue);border:1px solid rgba(90,157,224,0.3); }

/* ══════════════ LOG FORM ══════════════ */
.log-form { background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-top:20px;animation:slideDown 0.3s ease; }
.form-title { font-family:'Playfair Display',serif;font-size:16px;color:var(--gold);margin-bottom:20px; }
.form-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:16px; }
.form-group { display:flex;flex-direction:column;gap:6px; }
.form-group label { font-size:11px;color:var(--text2);letter-spacing:0.05em;text-transform:uppercase;font-family:'Noto Serif KR',serif; }
.form-group input,.form-group select,.form-group textarea { background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:13px;font-family:'Noto Serif KR',serif;outline:none;transition:border-color 0.2s; }
.form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color:var(--gold); }
.form-group select option { background:var(--surface2);color:var(--text); }
.form-group textarea { resize:vertical;min-height:80px; }
.form-section-title { font-size:11px;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;font-family:'Noto Serif KR',serif;padding:6px 0 2px;border-bottom:1px solid var(--border);margin-bottom:2px;grid-column:1/-1; }
.stars { display:flex;gap:4px; }
.star { font-size:22px;cursor:pointer;color:var(--text3);transition:color 0.15s; }

/* ══════════════ DIARY ══════════════ */
.diary-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px; }
.filters { display:flex;gap:8px;flex-wrap:wrap; }
.filter-btn { padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Serif KR',serif;cursor:pointer;transition:all 0.2s; }
.filter-btn.active { border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.08); }
.diary-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px; }
.diary-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:border-color 0.2s,transform 0.2s,box-shadow 0.2s;position:relative;overflow:hidden; }
.diary-card::before { content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));opacity:0;transition:opacity 0.2s; }
.diary-card:hover { border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow); }
.diary-card:hover::before { opacity:1; }
.card-top { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px; }
.card-title { font-family:'Playfair Display',serif;font-size:15px;color:var(--text);line-height:1.3; }
.card-year { font-size:11px;color:var(--text3);margin-top:2px;font-family:'Noto Serif KR',serif; }
.card-meta { display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--text2);margin-bottom:10px;font-family:'Noto Serif KR',serif; }
.card-review { font-size:12px;color:var(--text2);line-height:1.6;border-top:1px solid var(--border);padding-top:10px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; }
.stars-sm { font-size:13px; }
.empty-state { text-align:center;padding:80px 20px;color:var(--text3); }
.empty-state .icon { font-size:48px;margin-bottom:16px; }
.empty-state p { font-size:14px;line-height:1.8;font-family:'Noto Serif KR',serif; }

/* ══════════════ STATS ══════════════ */
.stats-summary { display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px; }
.stat-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px; }
.stat-label { font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;font-family:'Noto Serif KR',serif; }
.stat-val { font-family:'Playfair Display',serif;font-size:30px;color:var(--gold); }
.stat-sub { font-size:12px;color:var(--text3);margin-top:4px;font-family:'Noto Serif KR',serif; }
.stats-tabs { display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap; }
.stats-tab { padding:7px 16px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Serif KR',serif;cursor:pointer;transition:all 0.2s; }
.stats-tab.active { background:var(--gold);color:var(--bg);border-color:var(--gold); }
.stats-section { display:none; }
.stats-section.active { display:block; }
.bar-list { display:flex;flex-direction:column;gap:10px; }
.bar-row { display:flex;align-items:center;gap:12px;font-size:13px;font-family:'Noto Serif KR',serif; }
.bar-label { min-width:110px;color:var(--text2);font-size:12px;text-align:right; }
.bar-track { flex:1;height:10px;background:var(--surface3);border-radius:5px;overflow:hidden; }
.bar-fill { height:100%;border-radius:5px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 0.6s ease; }
.bar-val { min-width:36px;color:var(--text);font-size:12px; }
.month-grid { display:grid;grid-template-columns:repeat(12,1fr);gap:6px;margin-bottom:8px; }
.month-cell { background:var(--surface2);border-radius:6px;padding:10px 4px;text-align:center;font-size:11px;color:var(--text2); }
.month-cell.has-data { background:rgba(201,168,76,0.2);color:var(--gold); }
.month-cell .month-num { font-size:10px;color:var(--text3);margin-bottom:3px; }
.month-cell .month-cnt { font-family:'Playfair Display',serif;font-size:16px; }

/* ══════════════ MODAL ══════════════ */
.modal-bg { display:none;position:fixed;inset:0;background:var(--modal-bg-color);z-index:200;backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:20px; }
.modal-bg.open { display:flex; }
.modal { background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:28px;max-width:600px;width:100%;max-height:88vh;overflow-y:auto;animation:fadeIn 0.25s ease;box-shadow:var(--shadow); }
.modal-title { font-family:'Playfair Display',serif;font-size:22px;color:var(--text);margin-bottom:4px; }
.modal-sub { font-size:12px;color:var(--text2);margin-bottom:18px;font-family:'Noto Serif KR',serif; }
.detail-row { display:flex;gap:8px;margin-bottom:10px;font-size:13px;font-family:'Noto Serif KR',serif; }
.detail-label { color:var(--text2);min-width:100px; }
.detail-val { color:var(--text); }
.modal-review { background:var(--surface2);border-radius:var(--radius-sm);padding:14px;font-size:13px;color:var(--text);line-height:1.8;margin:14px 0;border-left:3px solid var(--gold);font-style:italic; }
.modal-actions { display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap; }

/* ══════════════════════════════════════════════════
   GOOGLE SHEETS JWT AUTH
══════════════════════════════════════════════════ */
let _gsToken = null;
let _gsTokenExp = 0;

async function getGSToken() {
  if(_gsToken && Date.now() < _gsTokenExp - 60000) return _gsToken;
  const now = Math.floor(Date.now()/1000);
  const header = btoa(JSON.stringify({alg:'RS256',typ:'JWT'})).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const claim  = btoa(JSON.stringify({
    iss: CONFIG.CLIENT_EMAIL,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    aud: 'https://oauth2.googleapis.com/token',
    exp: now+3600, iat: now
  })).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const sigInput = `${header}.${claim}`;
  const keyStr = CONFIG.PRIVATE_KEY.replace(/-----BEGIN RSA PRIVATE KEY-----|-----BEGIN PRIVATE KEY-----|-----END RSA PRIVATE KEY-----|-----END PRIVATE KEY-----|\n|\r/g,'');
  const keyData = Uint8Array.from(atob(keyStr), c=>c.charCodeAt(0));
  const cryptoKey = await crypto.subtle.importKey('pkcs8', keyData, {name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'}, false, ['sign']);
  const sigBuf = await crypto.subtle.sign('RSASSA-PKCS1-v1_5', cryptoKey, new TextEncoder().encode(sigInput));
  const sig = btoa(String.fromCharCode(...new Uint8Array(sigBuf))).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
  const jwt = `${sigInput}.${sig}`;
  const res = await fetch('https://oauth2.googleapis.com/token',{
    method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`
  });
  const data = await res.json();
  _gsToken = data.access_token;
  _gsTokenExp = Date.now() + (data.expires_in||3600)*1000;
  return _gsToken;
}

async function loadFromSheets() {
  setSyncStatus('syncing','불러오는 중...');
  try {
    const token = await getGSToken();
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${SHEET_NAME}!A2:V?majorDimension=ROWS`;
    const res = await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
    const data = await res.json();
    const rows = data.values || [];
    diary = rows.map(r => {
      const entry = {
        id:       parseInt(r[0])||Date.now(),
        type:     r[1]||'watched',
        addedAt:  r[2]||'',
        date:     r[3]||'',
        platform: r[4]||'',
        withWho:  r[5]||'',
        watchCountry: r[6]||'',
        watchCity:    r[7]||'',
        rating:   parseInt(r[8])||0,
        review:   r[9]||'',
        extra:    r[10]||'',
        memo:     r[11]||'',
        movie: {
          title:    r[12]||'',
          title_en: r[13]||'',
          year:     r[14]||'',
          director: r[15]||'',
          genre:    r[16]?(r[16].split(',')):[] ,
          country:  r[17]||'',
          runtime:  r[18]||'',
          rating:   r[19]||'',
          synopsis: r[20]||'',
          cast:     r[21]?(r[21].split(',')):[] ,
        }
      };
      return entry;
    }).filter(e=>e.movie.title);
    setSyncStatus('ok','동기화됨');
  } catch(e) {
    console.error('Sheets load error:', e);
    setSyncStatus('error','불러오기 실패');
  }
}

      m.title, m.title_en||'', m.year||'', m.director||'',
      (m.genre||[]).join(','), m.country||'', m.runtime||'', m.rating||'',
      m.synopsis||'', (m.cast||[]).join(',')
    ];
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${SHEET_NAME}!A:V:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`;
    await fetch(url,{
      method:'POST', headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
      body: JSON.stringify({values:[row]})
    });
    setSyncStatus('ok','저장됨');
  } catch(e) {
    console.error('Sheets save error:', e);
    setSyncStatus('error','저장 실패');
    // 로컬 백업
    try { localStorage.setItem('cinediary_backup', JSON.stringify(diary)); } catch(e2){}
  }
}

async function deleteFromSheets(id) {
  setSyncStatus('syncing','삭제 중...');
  try {
    const token = await getGSToken();
    // 먼저 전체 시트 가져와서 행 번호 찾기
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${SHEET_NAME}!A:A`;
    const res = await fetch(url,{headers:{Authorization:`Bearer ${token}`}});
    const data = await res.json();
    const rows = data.values || [];
    let rowIdx = -1;
    for(let i=1;i<rows.length;i++) { // A1은 헤더
      if(parseInt(rows[i][0]) === id) { rowIdx = i; break; }
    }
    if(rowIdx < 0) { setSyncStatus('ok','동기화됨'); return; }

    // 해당 행 삭제 (batchUpdate)
    const sheetMeta = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}?fields=sheets.properties`,{headers:{Authorization:`Bearer ${token}`}});
    const sheetData = await sheetMeta.json();
    const sheetId = sheetData.sheets[0].properties.sheetId;

    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}:batchUpdate`,{
      method:'POST', headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
      body: JSON.stringify({requests:[{deleteDimension:{range:{sheetId,dimension:'ROWS',startIndex:rowIdx,endIndex:rowIdx+1}}}]})
    });
    setSyncStatus('ok','동기화됨');
  } catch(e) {
    console.error('Delete error:', e);
    setSyncStatus('error','삭제 오류');
  }
}

function setSyncStatus(state, text) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  if(dot) { dot.className='sync-dot'; dot.classList.add(state==='ok'?'':''+state); }
  if(txt) txt.textContent = text;
}

function applyTheme(t,save=true){
  document.documentElement.setAttribute('data-theme',t);
  const k=document.getElementById('theme-knob'), l=document.getElementById('theme-label');
  if(t==='light'){if(k)k.textContent='☀';if(l)l.textContent='☀ 라이트';}

async function searchMovie(){

  document.getElementById('log-form-area').innerHTML='';
  area.innerHTML=`<div class="loading"><div class="spinner"></div>AI가 영화 정보를 검색 중입니다...</div>`;
  const prompt=`"${q}" 영화 정보를 아래 JSON 형식으로만 응답해. 설명 없이 JSON만. 마크다운 없이. 코드블록 없이.
{"title":"한국어제목","title_en":"영어제목","year":"연도숫자","director":"감독","genre":["장르1","장르2"],"country":"주요제작국가(한국어)","runtime":"러닝타임숫자","rating":"관람등급","synopsis":"한국어3줄이내줄거리","cast":["배우1","배우2","배우3"]}
영화를 모르면: {"error":"not_found"}`;
  try{
    const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});

    const data=await res.json();
    const text=(data.content||[]).map(c=>c.text||'').join('').trim().replace(/```json|```/g,'');

async function saveEntry(type){
  if(!currentSearchResult)return;
  const entry={id:Date.now(),type,movie:currentSearchResult,addedAt:new Date().toISOString()};
  if(type==='watched'){
    entry.date=document.getElementById('f-date')?.value||'';
    entry.platform=document.getElementById('f-platform')?.value||'';
    entry.withWho=document.getElementById('f-with')?.value||'';
    entry.watchCountry=document.getElementById('f-country')?.value||'';
    entry.watchCity=document.getElementById('f-city')?.value||'';
    entry.rating=currentRating;
    entry.review=document.getElementById('f-review')?.value||'';
    const title=currentSearchResult.title;
    const before=diary.length;
    diary=diary.filter(e=>!(e.type==='wishlist'&&e.movie.title===title));
    if(diary.length<before)showToast('♥ 위시리스트에서 자동 제거되었습니다.');
  }else{
    entry.memo=document.getElementById('f-memo')?.value||'';
  }
  entry.extra=document.getElementById('f-extra')?.value||'';
  diary.unshift(entry);
  updateHeader();
  document.getElementById('search-result').innerHTML='';
  document.getElementById('log-form-area').innerHTML='';
  document.getElementById('search-input').value='';
  currentSearchResult=null;
  showToast(type==='watched'?'🎬 관람 기록이 저장되었습니다!':'♥ 보고싶은 목록에 추가되었습니다!');
  // Google Sheets에 저장
  await saveToSheets(entry);
}

/* ══════════════════════════════════════════════════
   STATS
══════════════════════════════════════════════════ */
function renderStats(){
  const watched=diary.filter(e=>e.type==='watched');
  const wish=diary.filter(e=>e.type==='wishlist');
  const rated=watched.filter(e=>e.rating>0);
  const avg=rated.length?(rated.reduce((s,e)=>s+e.rating,0)/rated.length).toFixed(1):'-';
  document.getElementById('stats-summary').innerHTML=`
    <div class="stat-card"><div class="stat-label">총 관람 편수</div><div class="stat-val">${watched.length}</div><div class="stat-sub">편</div></div>
    <div class="stat-card"><div class="stat-label">보고싶은 목록</div><div class="stat-val">${wish.length}</div><div class="stat-sub">편 대기중</div></div>
    <div class="stat-card"><div class="stat-label">평균 별점</div><div class="stat-val">${avg}</div><div class="stat-sub">/ 5.0</div></div>`;
  function bar(entries,max){
    if(!entries.length)return`<div style="color:var(--text3);font-size:13px;padding:20px 0;font-family:'Noto Serif KR',serif;">데이터가 없습니다.</div>`;
    return`<div class="bar-list">${entries.map(([l,v])=>`<div class="bar-row"><div class="bar-label">${l}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/max*100)}%"></div></div><div class="bar-val">${v}편</div></div>`).join('')}</div>`;
  }
  // 연도별
  const byYear={};
  watched.forEach(e=>{const y=e.movie.year||'미상';byYear[y]=(byYear[y]||0)+1;});
  const ye=Object.entries(byYear).sort((a,b)=>b[0].localeCompare(a[0]));
  document.getElementById('stat-year').innerHTML=`<div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--text2);margin-bottom:14px;">관람 연도 분포</div>${bar(ye,ye.length?Math.max(...ye.map(x=>x[1])):1)}`;
  // 월별
  const bm=Array(12).fill(0);
  watched.forEach(e=>{const m=parseInt((e.date||'').split('-')[1]);if(m>=1&&m<=12)bm[m-1]++;});
  const mm=Math.max(...bm,1);
  const KM=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('stat-month').innerHTML=`
    <div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--text2);margin-bottom:14px;">월별 관람 횟수</div>
    <div class="month-grid">${bm.map((c,i)=>`<div class="month-cell ${c>0?'has-data':''}"><div class="month-num">${KM[i]}</div><div class="month-cnt">${c||'·'}</div></div>`).join('')}</div>
    <div style="margin-top:20px;">${bar(KM.map((m,i)=>[m,bm[i]]).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]),mm)}</div>`;
  // 국가별 (제작)
  const bc={};
  watched.forEach(e=>{const c=e.movie.country||'미상';bc[c]=(bc[c]||0)+1;});
  const ce=Object.entries(bc).sort((a,b)=>b[1]-a[1]);
  document.getElementById('stat-country').innerHTML=`<div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--text2);margin-bottom:14px;">제작 국가별</div>${bar(ce,ce.length?Math.max(...ce.map(x=>x[1])):1)}`;
  // 관람 도시
  const bcity={};const bcountryW={};
  watched.forEach(e=>{
    if(e.watchCountry){const k=e.watchCity?`${e.watchCountry} · ${e.watchCity}`:e.watchCountry;bcity[k]=(bcity[k]||0)+1;bcountryW[e.watchCountry]=(bcountryW[e.watchCountry]||0)+1;}
  });
  const cityE=Object.entries(bcity).sort((a,b)=>b[1]-a[1]);
  const cwE=Object.entries(bcountryW).sort((a,b)=>b[1]-a[1]);
  document.getElementById('stat-city').innerHTML=`
    <div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--text2);margin-bottom:14px;">관람 도시별</div>
    ${cityE.length?bar(cityE,Math.max(...cityE.map(x=>x[1]))):`<div style="color:var(--text3);font-size:13px;padding:12px 0;font-family:'Noto Serif KR',serif;">관람 위치를 입력하면 여기에 표시됩니다.</div>`}
    ${cwE.length?`<div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--text2);margin:24px 0 14px;">관람 국가별</div>${bar(cwE,Math.max(...cwE.map(x=>x[1])))}`:``}`;
  // 장르
  const bg={};watched.forEach(e=>(e.movie.genre||[]).forEach(g=>{bg[g]=(bg[g]||0)+1;}));
  const ge=Object.entries(bg).sort((a,b)=>b[1]-a[1]);
  document.getElementById('stat-genre').innerHTML=`<div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--text2);margin-bottom:14px;">장르별</div>${bar(ge,ge.length?Math.max(...ge.map(x=>x[1])):1)}`;
  // 플랫폼
  const bp={};watched.forEach(e=>{if(e.platform)bp[e.platform]=(bp[e.platform]||0)+1;});
  const pe=Object.entries(bp).sort((a,b)=>b[1]-a[1]);
  document.getElementById('stat-platform').innerHTML=`<div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--text2);margin-bottom:14px;">플랫폼별</div>${bar(pe,pe.length?Math.max(...pe.map(x=>x[1])):1)}`;
}

function updateHeader(){
  document.getElementById('hdr-watched').textContent=diary.filter(e=>e.type==='watched').length;
  document.getElementById('hdr-wish').textContent=diary.filter(e=>e.type==='wishlist').length;
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

init();
</script>
</body>
